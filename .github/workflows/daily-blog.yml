name: 📝 Daily Blog Post

on:
  # 매일 오전 9시~오후 1시 KST 사이 2시간 간격 실행 (GitHub 지연 대비)
  # 00:00 / 02:00 / 04:00 UTC = KST 09:00 / 11:00 / 13:00
  # 이미 오늘 포스팅된 경우 스크립트가 자동 skip
  schedule:
    - cron: '0 0,2,4 * * *'

  # GitHub Actions 탭에서 수동 실행 가능 (테스트용)
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 파일 커밋 권한
      pages: write      # GitHub Pages 배포 권한
      id-token: write   # OIDC 토큰 (Pages 배포에 필요)

    environment:
      name: github-pages

    steps:
      # 1. 저장소 체크아웃
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 2. Python 설치
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 의존성 설치 (anthropic 패키지)
      - name: 📦 Install dependencies
        run: pip install anthropic

      # 4. 블로그 포스트 생성
      - name: ✍️ Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_post.py

      # 5. 생성된 파일 커밋 & 푸시
      - name: 🚀 Commit and push
        run: |
          git config user.name  "Bithani Blog Bot"
          git config user.email "bot@bithani.github.io"
          git add blog/ sitemap.xml
          # 변경사항이 없으면 커밋하지 않음
          git diff --cached --quiet || git commit -m "📝 블로그 포스팅 $(date +'%Y-%m-%d')"
          git push

      # 6. GitHub Pages 배포 (GITHUB_TOKEN push는 deploy.yml을 트리거하지 않으므로 직접 배포)
      - name: 🔧 Setup Pages
        uses: actions/configure-pages@v4

      - name: 📦 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🌐 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
